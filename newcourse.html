<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="/src/ts/main.ts" defer></script>
    <title>Laboration 1 - TypeScript</title>
</head>

<body>
    <main>
        <h1>Lägg till kurs</h1>
        <div class="error-container">
            <ul id="error-message"></ul>
        </div>
        <form id="course-form">
            <div class="form-wrapper">
                <div class="label-container">
                    <label for="code">Kurskod</label>
                    <input type="text" name="code" id="code" maxlength="8" placeholder="Skriv kurskod...">
                </div>
                <div class="label-container">
                    <label for="coursename">Kursnamn</label>
                    <input type="text" name="coursename" id="coursename" maxlength="75" placeholder="Skriv kursnamn...">
                </div>
                <div class="label-container">
                    <label for="progression">Progression</label>
                    <input type="text" name="progression" id="progression" maxlength="1" placeholder="Skriv progression...">
                </div>
                <div class="label-container">
                    <label for="syllabus">Kursplan</label>
                    <input type="text" name="syllabus" id="syllabus" maxlength="75" placeholder="Skriv kursplan...">
                </div>
                <button type="submit" id="add-course-btn">Lägg till kurs</button>
            </div>
        </form>
        <a href="index.html" id="seecourse-btn">Se kurser</a>
    </main>
</body>

</html>
