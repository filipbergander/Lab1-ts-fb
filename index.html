<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="/src/ts/main.ts" defer></script>
    <title>Laboration 1 - TypeScript</title>
</head>

<body>
    <main>
        <h1>Information om kurser</h1>
        <button id="newcourse-button">Lägg till ny kurs</button>
        <form id="course-form" class="hidden">
            <label for="code">Kurskod</label>
            <input type="text" name="code" id="code">
            <br>
            <label for="coursename">Kursnamn</label>
            <input type="text" name="coursename" id="coursename">
            <br>
            <label for="progression">Progression</label>
            <input type="text" name="progression" id="progression">
            <br>
            <label for="syllabus">Kursplan</label>
            <input type="text" name="syllabus" id="syllabus">
            <br>
            <button type="submit" id="newcourse-button">Lägg till kurs</button>
        </form>
        <table id="table-course">
            <thead>
                <tr>
                    <th>Kurskod</th>
                    <th>Kursnamn</th>
                    <th>Progression</th>
                    <th>Kursplan</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Skriva ut nya kurser här-->
            </tbody>
        </table>
    </main>
</body>

</html>
